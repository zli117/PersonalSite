baseURL: 'https://www.lzl.me/'
languageCode: 'en-us'
title: 'Zonglin Li'
theme: 'PaperMod'

params:
  author: "Zonglin Li"

  # Enables the comments partial on all single (leaf) pages.
  comments: true

  # Configure at https://giscus.app (requires GitHub Discussions enabled on the repo).
  # Fill in the four IDs, then rebuild. Until these are set, the comments
  # partial renders nothing (so enabling `comments: true` above is safe).
  giscus:
    repo: "zli117/PersonalSite"
    repoId: "R_kgDORL6oVQ"
    category: "Comments"
    categoryId: "DIC_kwDORL6oVc4C7SYm"
    mapping: "pathname"
    reactionsEnabled: "1"
    inputPosition: "bottom"
    theme: "preferred_color_scheme"
    lang: "en"

  profileMode:
    enabled: true
    title: "Works in Progress"
    subtitle: "I write about AI, desktop Linux, and side projects. Mostly thinking out loud — you're welcome to think along."

  socialIcons: 
    - name: "github"
      url: "https://github.com/zli117"
    - name: "googlescholar"
      url: "https://scholar.google.com/citations?user=pffr_rsAAAAJ&hl=en"
    - name: "linkedin"
      url: "https://linkedin.com/in/lizonglin"
    - name: "x"
      url: "https://x.com/lizonglin1234"

menu:
  main:
    # - name: 'About'
    #   url: '/about/'
    #   weight: 1
    - name: 'Posts'
      url: '/posts/'
      weight: 2

markup:
  highlight:
    noClasses: false
    # Theme is controlled by assets/css/extended/chroma.css (light + dark).
    # Setting a `style` here would force inline styles on top — leave unset.

outputs:
  home:
    - 'HTML'
    - 'RSS'
  
caches:
  images:
    dir: :cacheDir/images
